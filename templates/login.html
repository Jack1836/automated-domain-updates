<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Content Aggregator</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Söhne:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 
           ChatGPT-style Login Page Aesthetic
           Minimalist, centered, sleek buttons.
        */
        :root {
            --primary-green: #10a37f;
            --primary-hover: #1a7f64;
            --bg-color: #ffffff;
            --text-main: #2d333a;
            --text-muted: #6e6e80;
            --border-color: #c5c5d2;
            --error-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: inherit;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--text-main);
        }

        .login-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
        }

        .logo-icon {
            margin-bottom: 2rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            text-align: center;
            font-family: 'Inter', sans-serif;
        }

        .login-container {
            width: 100%;
        }

        /* Form Group styling for inputs */
        .form-group {
            margin-bottom: 1rem;
            text-align: left;
            position: relative;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 1rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 1px var(--primary-green);
        }

        /* Error message styling */
        .error-message {
            color: var(--error-color);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
            /* Hidden by default */
        }

        /* Login Button */
        .continue-btn {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.5rem;
        }

        .continue-btn:hover {
            background-color: var(--primary-hover);
        }

        .continue-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .signup-text {
            color: var(--text-main);
            font-size: 0.9rem;
            text-align: center;
            margin-top: 1.5rem;
        }

        .signup-text a {
            color: var(--primary-green);
            text-decoration: none;
            margin-left: 0.2rem;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider:not(:empty)::before {
            margin-right: 1rem;
        }

        .divider:not(:empty)::after {
            margin-left: 1rem;
        }

        /* Social Buttons */
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 1rem;
            margin-bottom: 0.5rem;
            background-color: white;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            text-decoration: none;
            position: relative;
        }

        .social-btn:hover {
            background-color: #f7f7f8;
        }

        .social-btn img,
        .social-btn svg,
        .social-btn i {
            position: absolute;
            left: 1rem;
            width: 20px;
            height: 20px;
            font-size: 1.2rem;
        }
    </style>
</head>

                    fill="var(--text-main)" />
            </svg>
        </div>

        <h1 class="title">Welcome back</h1>

        <div class="login-container">
            <!-- Login Form -->
            <form id="loginForm" novalidate>
                <!-- Email Field -->
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email address" required>
                    <div class="error-message" id="emailError">Please enter a valid email address.</div>
                </div>

                <!-- Password Field -->
                <div class="form-group" id="passwordGroup" style="display: none;">
                    <input type="password" id="password" placeholder="Password">
                    <div class="error-message" id="passwordError">Please enter your password.</div>
                </div>

                <!-- Global Error for failed validation -->
                <div class="error-message" id="globalError" style="text-align: center; margin-bottom: 1rem;">
                    Wrong email or password
                </div>

                <button type="submit" class="continue-btn" id="continueBtn">Continue</button>
            </form>

            <div class="signup-text">
                Don't have an account? <a href="#">Sign up</a>
            </div>

            <div class="divider">OR</div>

            <!-- Social Logins -->

    <!-- JavaScript Validation -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordGroup = document.getElementById('passwordGroup');
            const passwordInput = document.getElementById('password');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');
            const globalError = document.getElementById('globalError');
            const continueBtn = document.getElementById('continueBtn');

            // Basic email regex pattern
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            let currentStep = 'email'; // Can be 'email' or 'password'

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();

                // Reset error states
                let isValid = true;
                emailError.style.display = 'none';
                passwordError.style.display = 'none';
                globalError.style.display = 'none';
                emailInput.style.borderColor = 'var(--border-color)';
                passwordInput.style.borderColor = 'var(--border-color)';

                const emailValue = emailInput.value.trim();

                if (currentStep === 'email') {
                    // 1. Validate Email
                    if (!emailValue) {
                        emailError.textContent = 'Email is required.';
                        emailError.style.display = 'block';
                        emailInput.style.borderColor = 'var(--error-color)';
                        isValid = false;
                    } else if (!emailPattern.test(emailValue)) {
                        emailError.textContent = 'Please enter a valid email address.';
                        emailError.style.display = 'block';
                        emailInput.style.borderColor = 'var(--error-color)';
                        isValid = false;
                    }

                    if (isValid) {
                        emailInput.readOnly = true;
                        emailInput.style.backgroundColor = '#f3f4f6';
                        passwordGroup.style.display = 'block';
                        passwordInput.required = true;
                        passwordInput.focus();
                        currentStep = 'password';
                    }
                } else if (currentStep === 'password') {
                    const passwordValue = passwordInput.value.trim();

                    if (!passwordValue) {
                        passwordError.style.display = 'block';
                        passwordInput.style.borderColor = 'var(--error-color)';
                        isValid = false;
                    }

                    if (isValid) {
                        // Simulate login
                        continueBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                        continueBtn.disabled = true;

                        setTimeout(() => {
                            // Redirect to the mock google login to grant a session
                            window.location.href = '/mock-google-login';
                        }, 800);
                    }
                }
            });
        });
    </script>
